version: '3.8'

services:
  bot-dashboard:
    build: .
    container_name: binance-momentum-dashboard
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=8787
      - DASHBOARD_AUTH_TOKEN=${DASHBOARD_AUTH_TOKEN:-}
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET:-}
      - ORDER_QUOTE_USDT=${ORDER_QUOTE_USDT:-50}
      - MAX_OPEN_POSITIONS=${MAX_OPEN_POSITIONS:-1}
      - LEVERAGE_MULTIPLIER=${LEVERAGE_MULTIPLIER:-10}
      - CONTRACT_MAX_MARGIN_LOSS_PCT=${CONTRACT_MAX_MARGIN_LOSS_PCT:-20}
      - LIQUIDATION_STOP_BUFFER_PCT=${LIQUIDATION_STOP_BUFFER_PCT:-2}
      - MIN_PRICE_CHANGE_PERCENT=${MIN_PRICE_CHANGE_PERCENT:-3}
      - MIN_VOLATILITY_PERCENT=${MIN_VOLATILITY_PERCENT:-5}
      - MIN_QUOTE_VOLUME_USDT=${MIN_QUOTE_VOLUME_USDT:-5000000}
      - POLL_SECONDS=${POLL_SECONDS:-300}
      - TELEGRAM_ENABLED=${TELEGRAM_ENABLED:-false}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      # 设为 1 可跳过 Playwright Chromium 下载（不需要广场抓取时）
      # - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
    volumes:
      - bot_data:/app/data
      # 持久化 Playwright 浏览器缓存，避免每次重启都重新下载
      - pw_cache:/root/.cache/ms-playwright

volumes:
  bot_data:
  pw_cache: