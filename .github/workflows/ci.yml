name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python
        run: python -m py_compile binance_square_momentum_bot.py web_dashboard.py tools/analyze_signal_records.py tools/replay_signal_records.py tools/walk_forward_signal_records.py

      - name: Run Python safety tests
        run: python tests/test_safety_and_risk.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
